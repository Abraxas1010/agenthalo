<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AgentHALO Proof Explorer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#040a0c;color:#c0c8d8;font-family:'SF Mono','Fira Code','Consolas',monospace;overflow:hidden}
#app{width:100vw;height:100vh;display:flex;flex-direction:column}

/* Header */
.header{padding:12px 20px;display:flex;align-items:center;gap:16px;border-bottom:1px solid rgba(34,211,238,0.12);background:rgba(4,10,12,0.95);z-index:10;flex-shrink:0}
.header h1{font-size:16px;font-weight:700;letter-spacing:0.05em}
.header h1 span{color:#22d3ee;text-shadow:0 0 10px rgba(34,211,238,0.5)}
.header .stats{font-size:10px;color:rgba(192,200,216,0.4);display:flex;gap:12px;margin-left:auto}
.header .stats span{display:flex;align-items:center;gap:4px}
.header .stats .dot{width:5px;height:5px;border-radius:50%;display:inline-block}

/* Controls */
.controls{padding:8px 20px;display:flex;flex-wrap:wrap;gap:6px;border-bottom:1px solid rgba(34,211,238,0.08);background:rgba(4,10,12,0.9);z-index:9;flex-shrink:0}
.pill{font-size:9px;padding:3px 10px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);cursor:pointer;user-select:none;transition:all 0.15s;letter-spacing:0.05em;text-transform:uppercase}
.pill:hover{border-color:rgba(255,255,255,0.25)}
.pill.active{border-color:var(--c,#22d3ee);background:color-mix(in srgb,var(--c,#22d3ee) 12%,transparent);color:var(--c,#22d3ee)}

/* Canvas area */
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:#020204}
#three-container{width:100%;height:100%;position:absolute;inset:0}

/* Moire overlay */
.moire-1{position:absolute;inset:0;pointer-events:none;opacity:0.5;background-image:repeating-linear-gradient(0deg,transparent,transparent 4px,#0a1315 4px,#0a1315 5px),repeating-linear-gradient(90deg,transparent,transparent 4px,#0a1315 4px,#0a1315 5px);background-size:12px 12px}
.moire-2{position:absolute;inset:0;pointer-events:none;opacity:0.45;background-image:repeating-linear-gradient(43deg,transparent,transparent 3px,#0c171a 3px,#0c171a 4px),repeating-linear-gradient(-43deg,transparent,transparent 3px,#0c171a 3px,#0c171a 4px);background-size:11px 11px}
.moire-3{position:absolute;inset:0;pointer-events:none;opacity:0.3;background-image:repeating-linear-gradient(30deg,transparent,transparent 2px,#080e10 2px,#080e10 3px);background-size:7px 7px}
.radial-glow{position:absolute;inset:0;pointer-events:none;opacity:0.15;background-image:radial-gradient(circle at 50% 50%,#00d4ee 0%,transparent 55%)}
.scanline-overlay{position:absolute;inset:0;pointer-events:none;z-index:20;opacity:0.35;background-image:repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(34,211,238,0.08) 2px,rgba(34,211,238,0.08) 3px),repeating-linear-gradient(-45deg,transparent,transparent 2px,rgba(34,211,238,0.06) 2px,rgba(34,211,238,0.06) 3px)}
.hline-overlay{position:absolute;inset:0;pointer-events:none;z-index:20;opacity:0.4;background-image:repeating-linear-gradient(0deg,transparent 0px,transparent 1px,rgba(34,211,238,0.12) 1px,rgba(34,211,238,0.12) 3px)}

/* Legend */
.legend{position:absolute;bottom:12px;right:12px;background:rgba(4,10,12,0.85);border:1px solid rgba(34,211,238,0.12);border-radius:8px;padding:10px 14px;font-size:9px;z-index:15;backdrop-filter:blur(6px)}
.legend-title{font-size:8px;color:rgba(192,200,216,0.35);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:6px}
.legend-item{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Loading */
.loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:30}
.loading .spinner{width:28px;height:28px;border:2px solid rgba(34,211,238,0.15);border-top-color:#22d3ee;border-radius:50%;animation:spin 0.8s linear infinite}
.loading .text{font-size:11px;color:rgba(34,211,238,0.5);letter-spacing:0.15em;text-transform:uppercase}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>Agent<span>HALO</span> Proof Explorer</h1>
    <div class="stats" id="stats"></div>
  </div>
  <div class="controls" id="controls"></div>
  <div class="canvas-wrap" id="wrap">
    <div class="moire-1"></div>
    <div class="moire-2"></div>
    <div class="moire-3"></div>
    <div class="radial-glow"></div>
    <div id="three-container"></div>
    <div class="scanline-overlay"></div>
    <div class="hline-overlay"></div>
    <div class="legend" id="legend"></div>
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="text">Initializing proof lattice...</div>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ── Color palette ──
const FAMILY_COLORS = {
  Core:            0x22d3ee,
  Comms:           0x06b6d4,
  Identity:        0x2dd4bf,
  Genesis:         0x34d399,
  Security:        0xf43f5e,
  Crypto:          0xa78bfa,
  PaymentChannels: 0xf59e0b,
  TrustLayer:      0x3b82f6,
  Sheaf:           0x8b5cf6,
  Adversarial:     0xef4444,
  Transparency:    0x10b981,
  Commitment:      0x6366f1,
  Contracts:       0xf97316,
  Integration:     0x14b8a6,
  Bridge:          0x0ea5e9,
};

const FAMILY_CSS = {};
for (const [k, v] of Object.entries(FAMILY_COLORS)) {
  FAMILY_CSS[k] = '#' + v.toString(16).padStart(6, '0');
}

const KIND_SHAPES = {
  theorem:   { label: 'Theorem' },
  lemma:     { label: 'Lemma' },
  def:       { label: 'Definition' },
  structure: { label: 'Structure' },
  axiom:     { label: 'Axiom' },
  instance:  { label: 'Instance' },
  example:   { label: 'Example' },
};

let DATA = null;
let enabledFamilies = {};

const container = document.getElementById('three-container');
const statsEl = document.getElementById('stats');
const controlsEl = document.getElementById('controls');
const legendEl = document.getElementById('legend');
const loadingEl = document.getElementById('loading');

// ── Data loading ──
fetch('proof-lattice.json')
  .then(r => r.json())
  .then(d => { DATA = d; init(); })
  .catch(e => { loadingEl.innerHTML = `<div class="text" style="color:#f43f5e">Failed to load: ${e.message}</div>`; });

function init() {
  loadingEl.style.display = 'none';

  DATA.families.forEach(f => enabledFamilies[f] = true);

  // Stats bar
  const s = DATA.stats;
  statsEl.innerHTML = `
    <span><span class="dot" style="background:#22d3ee"></span>${s.total_declarations} declarations</span>
    <span><span class="dot" style="background:#f43f5e"></span>${s.by_kind.theorem || 0} theorems</span>
    <span><span class="dot" style="background:#34d399"></span>${s.by_kind.lemma || 0} lemmas</span>
    <span><span class="dot" style="background:#3b82f6"></span>${s.by_kind.def || 0} definitions</span>
    <span><span class="dot" style="background:#a78bfa"></span>${s.by_kind.structure || 0} structures</span>
    <span><span class="dot" style="background:#888"></span>${s.total_files} files</span>
  `;

  // Family filter pills
  let html = '<span style="font-size:8px;color:rgba(192,200,216,0.3);text-transform:uppercase;letter-spacing:0.15em;margin-right:4px">Families</span>';
  DATA.families.forEach(f => {
    const c = FAMILY_CSS[f] || '#888';
    html += `<span class="pill active" data-fam="${f}" style="--c:${c}" onclick="window._toggleFam('${f}',this)">${f}</span>`;
  });
  html += '<span style="margin-left:8px;font-size:8px;color:rgba(192,200,216,0.3)">|</span>';
  html += `<span class="pill active" style="--c:#22d3ee" onclick="window._toggleRotate(this)">Auto-Rotate</span>`;
  controlsEl.innerHTML = html;

  // Legend
  let leg = '<div class="legend-title">Declaration Kind</div>';
  for (const [k, v] of Object.entries(KIND_SHAPES)) {
    if (DATA.stats.by_kind[k]) {
      leg += `<div class="legend-item"><div class="legend-dot" style="background:rgba(192,200,216,0.5)"></div>${v.label} (${DATA.stats.by_kind[k]})</div>`;
    }
  }
  legendEl.innerHTML = leg;

  // ── Three.js scene ──
  const rect = container.getBoundingClientRect();
  const width = rect.width || 960;
  const height = rect.height || 540;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x040a0c);

  const camera = new THREE.PerspectiveCamera(50, width / height, 0.1, 100);
  camera.position.set(0, 0, 2.5);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.enableZoom = true;
  controls.minDistance = 1;
  controls.maxDistance = 5;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 4.0;

  const clock = new THREE.Clock();

  // Post-processing
  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(width, height), 0.8, 0.3, 0.7
  );
  composer.addPass(bloomPass);

  // Lighting
  const ambient = new THREE.AmbientLight(0x2080a0, 0.5);
  scene.add(ambient);
  const directional = new THREE.DirectionalLight(0x20b0d0, 0.7);
  directional.position.set(2, 2, 2);
  scene.add(directional);
  const backLight = new THREE.DirectionalLight(0x108060, 0.4);
  backLight.position.set(-2, -1, -2);
  scene.add(backLight);
  const pointLight = new THREE.PointLight(0x00d4ee, 0.8, 5);
  pointLight.position.set(0, 0, 0);
  scene.add(pointLight);

  // Normalize positions to [0,1]
  const nodes = DATA.nodes;
  const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y), zs = nodes.map(n => n.z);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const minZ = Math.min(...zs), maxZ = Math.max(...zs);
  const rX = maxX - minX || 1, rY = maxY - minY || 1, rZ = maxZ - minZ || 1;
  const norm = (n) => ({
    nx: (n.x - minX) / rX,
    ny: (n.y - minY) / rY,
    nz: (n.z - minZ) / rZ,
  });

  const maxImportance = Math.max(...nodes.map(n => n.importance));

  // Nodes
  const nodeGroup = new THREE.Group();
  const nodeMeshes = [];

  nodes.forEach(node => {
    const color = FAMILY_COLORS[node.family] || 0x22d3ee;
    const sizeScale = 0.008 + (node.importance / maxImportance) * 0.012;
    const geo = new THREE.SphereGeometry(sizeScale, 16, 16);
    const mat = new THREE.MeshPhongMaterial({
      color, transparent: true, opacity: 0.95,
      emissive: 0x00d4ee, emissiveIntensity: 0.3, shininess: 80,
    });
    const mesh = new THREE.Mesh(geo, mat);
    const { nx, ny, nz } = norm(node);
    mesh.position.set((nx - 0.5) * 2, (ny - 0.5) * 2, (nz - 0.5) * 2);
    mesh._family = node.family;
    mesh._nodeId = node.id;
    mesh._importance = node.importance;
    mesh._originalColor = color;
    nodeGroup.add(mesh);
    nodeMeshes.push(mesh);
  });
  scene.add(nodeGroup);

  // Edges
  const edgeGroup = new THREE.Group();
  DATA.edges.forEach(([i, j]) => {
    const nA = nodes[i], nB = nodes[j];
    if (!nA || !nB) return;
    const a = norm(nA), b = norm(nB);
    const start = new THREE.Vector3((a.nx - 0.5) * 2, (a.ny - 0.5) * 2, (a.nz - 0.5) * 2);
    const end = new THREE.Vector3((b.nx - 0.5) * 2, (b.ny - 0.5) * 2, (b.nz - 0.5) * 2);
    const edgeImp = (nA.importance + nB.importance) / 2;
    const normImp = edgeImp / maxImportance;

    const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
    const dir = new THREE.Vector3().subVectors(end, start).normalize();
    const perp = new THREE.Vector3(-dir.y, dir.x, dir.z * 0.3).normalize();
    const offset = 0.02 + Math.random() * 0.04;
    mid.add(perp.multiplyScalar(offset * (Math.random() > 0.5 ? 1 : -1)));

    const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
    const tubeRadius = 0.001 + normImp * 0.003;
    const tubeGeo = new THREE.TubeGeometry(curve, 12, tubeRadius, 6, false);
    const edgeColor = new THREE.Color(0x22d3ee);
    const tubeMat = new THREE.MeshBasicMaterial({
      color: edgeColor, transparent: true, opacity: 0.2 + normImp * 0.5,
    });
    const tube = new THREE.Mesh(tubeGeo, tubeMat);
    tube._nodeA = i; tube._nodeB = j;
    tube._famA = nA.family; tube._famB = nB.family;
    tube._defaultColor = edgeColor.clone();
    tube._baseColor = edgeColor.clone();
    tube._baseOpacity = tubeMat.opacity;
    edgeGroup.add(tube);
  });
  scene.add(edgeGroup);

  // Particles
  const particleCount = 150;
  const pGeo = new THREE.BufferGeometry();
  const pPos = new Float32Array(particleCount * 3);
  const pCol = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    pPos[i * 3] = (Math.random() - 0.5) * 3;
    pPos[i * 3 + 1] = (Math.random() - 0.5) * 3;
    pPos[i * 3 + 2] = (Math.random() - 0.5) * 3;
    const cool = 0.4 + Math.random() * 0.4;
    pCol[i * 3] = cool * 0.3;
    pCol[i * 3 + 1] = cool * 0.8;
    pCol[i * 3 + 2] = cool;
  }
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  pGeo.setAttribute('color', new THREE.BufferAttribute(pCol, 3));
  const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({
    size: 0.015, transparent: true, opacity: 0.25, vertexColors: true,
  }));
  scene.add(particles);

  // Neural firing state
  const firingNodes = new Map();
  const firingEdges = new Map();
  const FIRE_DURATION = 0.5;
  const NODE_FIRE_CHANCE = 0.08;
  const EDGE_FIRE_CHANCE = 0.12;
  const PROPAGATION_DELAY = 0.03;
  const CASCADE_CHANCE = 0.5;

  let elapsedTime = 0;

  // Toggle handlers
  window._toggleFam = (f, el) => {
    enabledFamilies[f] = !enabledFamilies[f];
    el.classList.toggle('active');
    updateFilter(enabledFamilies[f] ? null : null);
  };
  window._toggleRotate = (el) => {
    controls.autoRotate = !controls.autoRotate;
    el.classList.toggle('active');
  };

  function updateFilter() {
    nodeMeshes.forEach(mesh => {
      const on = enabledFamilies[mesh._family] !== false;
      mesh.visible = on;
    });
    edgeGroup.children.forEach(tube => {
      const onA = enabledFamilies[tube._famA] !== false;
      const onB = enabledFamilies[tube._famB] !== false;
      tube.visible = onA && onB;
    });
  }

  // Animation loop
  function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    elapsedTime += delta;

    controls.update();

    const pulse = Math.sin(elapsedTime * 2.5) * 0.5 + 0.5;
    const slowPulse = Math.sin(elapsedTime * 1.5) * 0.4 + 0.6;

    pointLight.intensity = 0.3 + pulse * 1.2;

    // Neural firing
    if (Math.random() < NODE_FIRE_CHANCE) {
      const idx = Math.floor(Math.random() * nodeMeshes.length);
      if (!firingNodes.has(idx)) {
        firingNodes.set(idx, { startTime: elapsedTime, intensity: 0.9 + Math.random() * 0.1 });
        edgeGroup.children.forEach((tube, edgeIdx) => {
          if (tube._nodeA === idx || tube._nodeB === idx) {
            if (!firingEdges.has(edgeIdx)) {
              firingEdges.set(edgeIdx, {
                startTime: elapsedTime + PROPAGATION_DELAY,
                intensity: 0.9 + Math.random() * 0.1,
                direction: tube._nodeA === idx ? 1 : -1
              });
              if (Math.random() < CASCADE_CHANCE) {
                const target = tube._nodeA === idx ? tube._nodeB : tube._nodeA;
                if (!firingNodes.has(target)) {
                  firingNodes.set(target, {
                    startTime: elapsedTime + PROPAGATION_DELAY * 2.5,
                    intensity: 0.75 + Math.random() * 0.2
                  });
                }
              }
            }
          }
        });
      }
    }
    if (Math.random() < EDGE_FIRE_CHANCE) {
      const idx = Math.floor(Math.random() * edgeGroup.children.length);
      if (!firingEdges.has(idx)) {
        firingEdges.set(idx, {
          startTime: elapsedTime, intensity: 0.7 + Math.random() * 0.3,
          direction: Math.random() > 0.5 ? 1 : -1
        });
      }
    }

    // Update firing nodes
    nodeMeshes.forEach((mesh, i) => {
      if (!mesh.material) return;
      const nodePhase = Math.sin(elapsedTime * 2.5 + i * 0.03) * 0.3 + 0.7;
      let emInt = 0.15 + nodePhase * slowPulse * 0.5;
      const emColor = 0x00d4ee;
      let targetScale = mesh._baseScale || 1;

      const firing = firingNodes.get(i);
      if (firing) {
        const fe = elapsedTime - firing.startTime;
        if (fe >= 0 && fe < FIRE_DURATION) {
          const fp = fe / FIRE_DURATION;
          const fi = fp < 0.12 ? fp / 0.12 : Math.pow(1 - ((fp - 0.12) / 0.88), 1.5);
          emInt = 0.4 + firing.intensity * fi * 3.0;
          targetScale = (mesh._baseScale || 1) * (1 + fi * 0.6);
          if (fi > 0.3) {
            mesh.material.emissive.setHex(0xccffff);
            mesh.material.color.setHex(0xffffff);
          } else if (fi > 0.15) {
            mesh.material.emissive.setHex(0x88ddff);
            mesh.material.color.setHex(mesh._originalColor);
          } else {
            mesh.material.emissive.setHex(emColor);
            mesh.material.color.setHex(mesh._originalColor);
          }
        } else if (fe >= FIRE_DURATION) {
          firingNodes.delete(i);
          mesh.material.emissive.setHex(emColor);
          mesh.material.color.setHex(mesh._originalColor);
        }
      } else {
        mesh.material.emissive.setHex(emColor);
      }
      mesh.material.emissiveIntensity = emInt;
      const cs = mesh.scale.x;
      mesh.scale.setScalar(cs + (targetScale - cs) * 0.15);
    });

    // Update firing edges
    edgeGroup.children.forEach((tube, idx) => {
      const mat = tube.material;
      const firing = firingEdges.get(idx);
      if (firing) {
        const fe = elapsedTime - firing.startTime;
        if (fe >= 0 && fe < FIRE_DURATION) {
          const fp = fe / FIRE_DURATION;
          const pp = fp * 1.3;
          const fi = Math.exp(-Math.pow((pp - 0.5) / 0.2, 2)) * firing.intensity;
          if (fi > 0.2) {
            mat.color.setHex(0xaaffff);
            mat.opacity = Math.min(1, 0.6 + fi * 0.4);
          } else if (fi > 0.08) {
            mat.color.setHex(0x66ccff);
            mat.opacity = Math.min(1, 0.4 + fi * 0.4);
          } else {
            mat.color.copy(tube._baseColor || new THREE.Color(0x22d3ee));
            if (typeof tube._baseOpacity === 'number') mat.opacity = tube._baseOpacity;
          }
        } else if (fe >= FIRE_DURATION) {
          firingEdges.delete(idx);
          mat.color.copy(tube._baseColor || new THREE.Color(0x22d3ee));
          if (typeof tube._baseOpacity === 'number') mat.opacity = tube._baseOpacity;
        }
      }
    });

    const activeFirings = firingNodes.size + firingEdges.size;
    bloomPass.strength = 0.6 + Math.min(activeFirings * 0.03, 0.5);
    if (activeFirings > 0) {
      pointLight.intensity = 0.4 + pulse * 1.0 + activeFirings * 0.04;
      pointLight.color.setHex(0x99ddff);
    } else {
      pointLight.color.setHex(0x00d4ee);
    }
    ambient.intensity = 0.25 + slowPulse * 0.4;
    particles.rotation.y += delta * 0.08;
    particles.rotation.x += delta * 0.04;

    composer.render();
  }
  animate();

  // Resize
  function onResize() {
    const r = container.getBoundingClientRect();
    const w = r.width || 960, h = r.height || 540;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    composer.setSize(w, h);
  }
  window.addEventListener('resize', onResize);
}
</script>
</body>
</html>
