# ──────────────────────────────────────────────────────────────────
# PERSISTENT Discord recording bridge.
#
# This is a long-lived service that records Discord messages to an
# immutable NucleusDB ledger. It runs independently of any testing
# or development AgentHALO instance.
#
# Start:  docker compose -f docker-compose.discord.yml up -d --build
# Stop:   docker compose -f docker-compose.discord.yml down
# Wipe:   docker compose -f docker-compose.discord.yml down -v
#         ↑ DESTRUCTIVE — destroys all recorded Discord data
#
# Before first run:
#   cp deploy/discord.env.example deploy/discord.env
#   # Edit deploy/discord.env and set NUCLEUSDB_DISCORD_TOKEN
# ──────────────────────────────────────────────────────────────────
services:
  discord-bridge:
    container_name: agenthalo-discord-bridge
    build: .
    command:
      - agenthalo
      - p2pclaw
      - bridge
      - run-loop
      - --live
      - --heartbeat
      - --tau-sync
    labels:
      com.agenthalo.role: "discord-recording"
      com.agenthalo.persistent: "true"
      com.agenthalo.description: "Long-lived Discord message recorder — do NOT delete"
    env_file:
      - path: deploy/discord.env
        required: true
    environment:
      AGENTHALO_HOME: /data
      NUCLEUSDB_HOME: /data
    volumes:
      - agenthalo-discord-data:/data
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 512m
    cpus: 0.25
    read_only: true
    tmpfs:
      - /tmp:size=50M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  agenthalo-discord-data:
    name: agenthalo-discord-data
    labels:
      com.agenthalo.role: "discord-recording"
      com.agenthalo.persistent: "true"
