# ──────────────────────────────────────────────────────────────────
# EPHEMERAL development / testing instance.
#
# This stack is for local testing and manual review. Its data is
# disposable — wipe it freely with `docker compose down -v`.
#
# For the persistent Discord recording bridge, use:
#   docker compose -f docker-compose.discord.yml up -d --build
#
# WARNING: mounting /var/run/docker.sock gives this container
# host-level Docker control. Required for operator-subsidiary
# container pattern. Keep this deployment on trusted machines only.
#
# For setup-page parity with a host-native install, this dev stack also mounts
# the operator's home directory read-only so host-installed CLI agents and
# their OAuth state can be detected inside the container.
# ──────────────────────────────────────────────────────────────────
services:
  nucleusdb:
    container_name: agenthalo-dev
    build: .
    user: "0:0"
    labels:
      com.agenthalo.role: "development"
      com.agenthalo.persistent: "false"
      com.agenthalo.description: "Ephemeral dev/test instance — safe to wipe"
    env_file:
      - path: deploy/discord.env
        required: false
    environment:
      HOME: ${HOME}
      AGENTHALO_CLI_HOME: ${HOME}
      PATH: ${HOME}/.local/bin:${HOME}/.nvm/versions/node/v22.22.0/bin:${PATH}
      NUCLEUSDB_HOME: /data
      AGENTHALO_HOME: /data
      NUCLEUSDB_CONTAINER_IMAGE: ${NUCLEUSDB_CONTAINER_IMAGE:-nucleusdb:latest}
      NUCLEUSDB_CONTAINER_REGISTRY_VOLUME: ${NUCLEUSDB_CONTAINER_REGISTRY_VOLUME:-nucleusdb-mesh}
      NUCLEUSDB_MCP_PORT: ${MCP_PORT:-3000}
      NUCLEUSDB_DASHBOARD_PORT: ${DASHBOARD_PORT:-3100}
      NUCLEUSDB_API_PORT: ${API_PORT:-8088}
      AGENTHALO_PASSWORD_BOOTSTRAP_MODE: ${AGENTHALO_PASSWORD_BOOTSTRAP_MODE:-required}
    volumes:
      - nucleusdb-dev-data:/data
      - nucleusdb-dev-mesh:/data/mesh
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}:${HOME}:ro
    group_add:
      - "${DOCKER_GID:-0}"
    ports:
      - "${MCP_PORT:-3001}:3000"
      - "${DASHBOARD_PORT:-3100}:3100"
      - "${API_PORT:-8088}:8088"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=50M
      - /run:size=10M
    # The review container runs as root only to read the operator's host-side
    # CLI binaries and OAuth files through the read-only home bind mount.
    # Retain the minimum DAC capabilities needed for that parity surface.
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - DAC_READ_SEARCH
    security_opt:
      - no-new-privileges:true

volumes:
  nucleusdb-dev-data:
    name: nucleusdb-dev-data
    labels:
      com.agenthalo.role: "development"
      com.agenthalo.persistent: "false"
  nucleusdb-dev-mesh:
    name: nucleusdb-dev-mesh
    labels:
      com.agenthalo.role: "development"
      com.agenthalo.persistent: "false"
