# ──────────────────────────────────────────────────────────────────
# EPHEMERAL development / testing instance.
#
# This stack is for local testing and manual review. Its data is
# disposable — wipe it freely with `docker compose down -v`.
#
# For the persistent Discord recording bridge, use:
#   docker compose -f docker-compose.discord.yml up -d --build
#
# WARNING: mounting /var/run/docker.sock gives this container
# host-level Docker control. Required for operator-subsidiary
# container pattern. Keep this deployment on trusted machines only.
# ──────────────────────────────────────────────────────────────────
services:
  nucleusdb:
    container_name: agenthalo-dev
    build: .
    labels:
      com.agenthalo.role: "development"
      com.agenthalo.persistent: "false"
      com.agenthalo.description: "Ephemeral dev/test instance — safe to wipe"
    env_file:
      - path: deploy/discord.env
        required: false
    environment:
      NUCLEUSDB_HOME: /data
      AGENTHALO_HOME: /data
      NUCLEUSDB_CONTAINER_IMAGE: ${NUCLEUSDB_CONTAINER_IMAGE:-nucleusdb:latest}
      NUCLEUSDB_CONTAINER_REGISTRY_VOLUME: ${NUCLEUSDB_CONTAINER_REGISTRY_VOLUME:-nucleusdb-mesh}
      NUCLEUSDB_MCP_PORT: ${MCP_PORT:-3000}
      NUCLEUSDB_DASHBOARD_PORT: ${DASHBOARD_PORT:-3100}
      NUCLEUSDB_API_PORT: ${API_PORT:-8088}
    volumes:
      - nucleusdb-dev-data:/data
      - nucleusdb-dev-mesh:/data/mesh
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-0}"
    ports:
      - "${MCP_PORT:-3001}:3000"
      - "${DASHBOARD_PORT:-3100}:3100"
      - "${API_PORT:-8088}:8088"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=50M
      - /run:size=10M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  nucleusdb-dev-data:
    name: nucleusdb-dev-data
    labels:
      com.agenthalo.role: "development"
      com.agenthalo.persistent: "false"
  nucleusdb-dev-mesh:
    name: nucleusdb-dev-mesh
    labels:
      com.agenthalo.role: "development"
      com.agenthalo.persistent: "false"
