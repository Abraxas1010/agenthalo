services:
  agenthalo:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      AGENTHALO_HOME: /data
      AGENTHALO_DASHBOARD_HOST: "0.0.0.0"
      AGENTHALO_DASHBOARD_PORT: "3100"
      AGENTHALO_MCP_HOST: "0.0.0.0"
      AGENTHALO_MCP_PORT: "8390"
      WDK_SIDECAR_DIR: /opt/wdk-sidecar
      NYM_PROVIDER: "${NYM_PROVIDER:-}"
      NYM_FAIL_OPEN: "${NYM_FAIL_OPEN:-false}"
      NYM_MAX_PROVIDER_ATTEMPTS: "3"
    volumes:
      - agent-data:/data
    ports:
      - "${DASHBOARD_PORT:-3100}:3100"
      - "${MCP_PORT:-8390}:8390"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=100M
      - /run:size=10M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  agent-data:
