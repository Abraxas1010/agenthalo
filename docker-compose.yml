# WARNING:
# Mounting /var/run/docker.sock grants code inside the operator container
# effective control over the host Docker daemon. Keep this compose file for
# trusted operator deployments only.
services:
  agenthalo:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      AGENTHALO_HOME: /data
      AGENTHALO_DASHBOARD_HOST: "0.0.0.0"
      AGENTHALO_DASHBOARD_PORT: "3100"
      AGENTHALO_MCP_HOST: "0.0.0.0"
      AGENTHALO_MCP_PORT: "8390"
      AGENTHALO_CONTAINER_REGISTRY_VOLUME: "agenthalo-mesh"
      WDK_SIDECAR_DIR: /opt/wdk-sidecar
      NYM_PROVIDER: "${NYM_PROVIDER:-}"
      NYM_FAIL_OPEN: "${NYM_FAIL_OPEN:-false}"
      NYM_MAX_PROVIDER_ATTEMPTS: "3"
    volumes:
      - agent-data:/data
      - agenthalo-mesh:/data/mesh
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${DASHBOARD_PORT:-3100}:3100"
      - "${MCP_PORT:-8390}:8390"
    restart: unless-stopped
    group_add:
      - "${DOCKER_GID:-0}"
    read_only: true
    tmpfs:
      - /tmp:size=100M
      - /run:size=10M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  agent-data:
  agenthalo-mesh:
