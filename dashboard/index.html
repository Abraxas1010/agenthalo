<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent H.A.L.O. Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="vendor/xterm.css">
  <link rel="stylesheet" href="cockpit.css">
  <link rel="stylesheet" href="deploy.css">
  <script src="chart.min.js"></script>
  <script src="vendor/xterm.min.js"></script>
  <script src="vendor/xterm-addon-fit.min.js"></script>
  <script src="vendor/xterm-addon-webgl.min.js"></script>
</head>
<body>
  <div id="crt-overlay"></div>
  <nav id="sidebar">
    <div class="sidebar-header">
      <img class="halo-logo" src="img/agent_halo_logo.png" alt="Agent H.A.L.O." onerror="this.style.display='none'">
      <div class="logo">H.A.L.O.</div>
      <div class="logo-sub"><span class="logo-letter">H</span>uman-<span class="logo-letter">A</span>gent <span class="logo-letter">L</span>attice <span class="logo-letter">O</span>rchestration</div>
    </div>
    <ul class="nav-links">
      <li><a href="#/overview" class="nav-link active" data-page="overview">
        <span class="nav-icon">&#9673;</span> Overview</a></li>
      <li><a href="#/sessions" class="nav-link" data-page="sessions">
        <span class="nav-icon">&#9776;</span> Sessions</a></li>
      <li><a href="#/costs" class="nav-link" data-page="costs">
        <span class="nav-icon">&#36;</span> Costs</a></li>
      <li><a href="#/config" class="nav-link" data-page="config">
        <span class="nav-icon">&#9881;</span> Configuration</a></li>
      <li><a href="#/setup" class="nav-link" data-page="setup">
        <span class="nav-icon">&#9888;</span> Quick Setup</a></li>
      <li><a href="#/trust" class="nav-link" data-page="trust">
        <span class="nav-icon">&#10003;</span> Trust</a></li>
      <li><a href="#/nucleusdb" class="nav-link" data-page="nucleusdb">
        <span class="nav-icon">&#9762;</span> NucleusDB</a></li>
      <li><a href="#/cockpit" class="nav-link" data-page="cockpit">
        <span class="nav-icon">&#9654;</span> Cockpit</a></li>
      <li><a href="#/deploy" class="nav-link" data-page="deploy">
        <span class="nav-icon">&#9732;</span> Deploy</a></li>
    </ul>
    <div class="sidebar-footer">
      <div class="version" id="version-label">v0.3.0</div>
      <button class="theme-toggle" onclick="toggleCRT()" title="Toggle CRT effects" id="crt-toggle">CRT</button>
    </div>
  </nav>
  <main id="content">
    <div id="page-loading" class="loading">Initializing terminal...</div>
  </main>
  <script src="app.js"></script>
  <script src="cockpit.js"></script>
  <script src="deploy.js"></script>
</body>
</html>
