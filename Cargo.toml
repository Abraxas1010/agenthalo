[package]
name = "nucleusdb"
version = "0.1.0"
edition = "2021"
description = "Verifiable database with vector commitments, post-quantum signatures, and Certificate Transparency"
license = "Apoth3osis-License-Stack-v1"
repository = "https://github.com/Abraxas1010/nucleusdb"

[lib]
name = "nucleusdb"
path = "src/lib.rs"

[[bin]]
name = "nucleusdb"
path = "src/bin/nucleusdb.rs"

[[bin]]
name = "nucleusdb-server"
path = "src/bin/nucleusdb_server.rs"

[[bin]]
name = "nucleusdb-tui"
path = "src/bin/nucleusdb_tui.rs"

[[bin]]
name = "nucleusdb-mcp"
path = "src/bin/nucleusdb_mcp.rs"

[features]
default = []

[dependencies]
axum = "0.8.6"
tokio = { version = "1.48.0", features = ["macros", "rt-multi-thread", "net", "io-std"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
redb = "2.2.0"
ark-bls12-381 = "0.5.0"
ark-ec = "0.5.0"
ark-ff = "0.5.0"
ark-serialize = "0.5.0"
curve25519-dalek = { version = "4.1.3", features = ["digest"] }
ed25519-dalek = "2.2.0"
kzg-mini = "0.1.1"
ml-dsa = "0.1.0-rc.7"
sqlparser = "0.59.0"
clap = { version = "4", features = ["derive"] }
rustyline = "15"
ratatui = "0.30"
crossterm = "0.28"
rmcp = { version = "0.16.0", features = ["transport-io", "schemars"] }
schemars = "1"
